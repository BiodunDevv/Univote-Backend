<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
  </head>
  <body style="margin:0;background:#f6f7fb;color:#111827;font-family:Inter,Arial,sans-serif;">
    <div style="margin:0 auto;max-width:640px;padding:24px 16px;">
      <div style="overflow:hidden;border:1px solid #e5e7eb;border-radius:24px;background:#ffffff;">
        <div style="padding:24px 24px 16px;border-bottom:1px solid #f1f5f9;background:linear-gradient(180deg,#ffffff 0%,#f8fafc 100%);">
          <div style="display:flex;align-items:center;gap:12px;">
            {{#if logo_url}}
            <img src="{{logo_url}}" alt="Univote" style="height:36px;width:36px;border-radius:10px;object-fit:cover;" />
            {{/if}}
            <div>
              <div style="font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#64748b;">Univote Update</div>
              <div style="margin-top:4px;font-size:22px;font-weight:700;color:#0f172a;">{{title}}</div>
            </div>
          </div>
        </div>
        <div style="padding:24px;">
          <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#334155;">
            Hello {{recipient_name}},
          </p>
          <p style="margin:0 0 16px;font-size:14px;line-height:1.7;color:#334155;white-space:pre-line;">
            {{body}}
          </p>
          {{#if cta_link}}
          <div style="margin-top:20px;">
            <a href="{{cta_link}}" style="display:inline-block;border-radius:12px;background:#111827;color:#ffffff;padding:10px 16px;text-decoration:none;font-size:13px;font-weight:600;">
              {{#if cta_label}}{{cta_label}}{{else}}Open Univote{{/if}}
            </a>
          </div>
          {{/if}}
        </div>
        <div style="padding:16px 24px;border-top:1px solid #f1f5f9;background:#f8fafc;font-size:12px;line-height:1.6;color:#64748b;">
          This message was sent to you because you are registered as a {{role_label}} on Univote.
          <br />
          &copy; {{year}} Univote. All rights reserved.
        </div>
      </div>
    </div>
  </body>
</html>
